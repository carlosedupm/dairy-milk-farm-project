services:
  - type: web
    name: ceialmilk-api
    runtime: docker
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGIN
        value: https://ceialmilk.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: ceialmilk-db
          property: connectionString
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
    # Deploy automático só depois que os checks do GitHub (CI) passarem na main.
    # Complementa a branch protection (ver memory-bank/deploy-notes.md).
    autoDeployTrigger: checksPass

databases:
  - name: ceialmilk-db
    databaseName: ceialmilk
    user: ceialmilk
    plan: free
