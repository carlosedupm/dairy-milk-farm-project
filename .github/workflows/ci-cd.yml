name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docs-validate:
    name: Docs - Validate BR references
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Validate business rule references
      run: node scripts/validate-br-refs.mjs

  backend-lint-build:
    name: Backend - Lint and Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: backend/go.mod
        cache-dependency-path: backend/go.sum

    - name: Download dependencies
      working-directory: backend
      run: go mod download

    - name: Verify Go modules
      working-directory: backend
      run: go mod verify

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        working-directory: backend

    - name: Run govulncheck
      working-directory: backend
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

    - name: Run Go tests
      working-directory: backend
      run: go test ./... -count=1

    - name: Build backend
      working-directory: backend
      run: go build -o /tmp/api ./cmd/api

  frontend-lint:
    name: Frontend - Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Cache ESLint
      uses: actions/cache@v4
      with:
        path: frontend/.eslintcache
        key: eslint-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/eslint.config.mjs') }}
        restore-keys: |
          eslint-${{ runner.os }}-

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Audit npm dependencies
      working-directory: frontend
      run: npm audit --audit-level=high

    - name: Run unit tests
      working-directory: frontend
      run: npm run test:unit

    - name: TypeScript check
      working-directory: frontend
      run: npm run typecheck

    - name: Run ESLint
      working-directory: frontend
      env:
        ESLINT_USE_FLAT_CONFIG: 'true'
      run: npm run lint:ci

    - name: Validate design tokens
      working-directory: frontend
      run: npm run validate:tokens

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Build frontend
      working-directory: frontend
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8080
      run: npm run build

  docker-build:
    name: Backend - Docker build (smoke test)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t ceialmilk-api:ci .
