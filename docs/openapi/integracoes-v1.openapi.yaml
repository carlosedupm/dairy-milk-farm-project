# CeialMilk — API M2M de integrações (v1)
# Manter alinhado a backend/internal/handlers/integracao_handler.go
openapi: 3.0.3
info:
  title: CeialMilk API de Integrações
  description: |
    API máquina-a-máquina para sistemas externos e agentes de IA.
    Autenticação via `Authorization: Bearer cmk_live_...` (gerada em Admin → Integrações).

    **Importante:** `fazenda_id` e `identificacao` em buscas vão na **query string** da URL, não em headers.

    Documentação interativa: `/api/v1/integracoes/docs`
  version: 1.0.0
  contact:
    name: CeialMilk

servers:
  - url: /
    description: Servidor atual (mesmo host onde abriu o Swagger ou importou a spec)

tags:
  - name: Cliente
    description: Metadados do cliente autenticado
  - name: Animais
    description: Consulta de animais (scope animais:read)
  - name: Coberturas
    description: Coberturas — leitura (coberturas:read) e registo (coberturas:write)
  - name: Toques
    description: Registo de diagnósticos de gestação (scope toques:write)

security:
  - IntegrationApiKey: []

paths:
  /api/v1/integracoes/me:
    get:
      tags: [Cliente]
      summary: Metadados do cliente
      description: Retorna nome, scopes e fazendas autorizadas para a chave em uso.
      operationId: integracaoMe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessIntegracaoMe"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/integracoes/animais/search:
    get:
      tags: [Animais]
      summary: Buscar animais por identificação
      description: |
        Parâmetros obrigatórios na **query string** (não usar headers).
        Requer scope `animais:read` e fazenda vinculada ao cliente.
      operationId: searchAnimais
      parameters:
        - $ref: "#/components/parameters/FazendaIdQuery"
        - $ref: "#/components/parameters/IdentificacaoQuery"
      responses:
        "200":
          description: Lista de animais (pode ser vazia)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAnimalList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/integracoes/animais/{id}:
    get:
      tags: [Animais]
      summary: Obter animal por ID
      operationId: getAnimal
      parameters:
        - $ref: "#/components/parameters/AnimalIdPath"
      responses:
        "200":
          description: Animal encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAnimal"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/integracoes/coberturas:
    get:
      tags: [Coberturas]
      summary: Listar coberturas do animal
      operationId: listCoberturas
      parameters:
        - name: animal_id
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: ID do animal
      responses:
        "200":
          description: Lista de coberturas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessCoberturaList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Coberturas]
      summary: Registar uma cobertura
      description: |
        Regista inseminação/monta na matriz. Regras de domínio (fêmea, reprodutor em monta natural, etc.) aplicam-se no servidor.
        Header opcional `Idempotency-Key` para evitar duplicatas em reenvio.
      operationId: createCobertura
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCoberturaRequest"
      responses:
        "201":
          description: Cobertura criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessCobertura"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/integracoes/coberturas/lote:
    post:
      tags: [Coberturas]
      summary: Registar coberturas em lote
      description: |
        Processa cada item independentemente (sucesso parcial). Matriz identificada por `identificacao` (brinco).
        `Idempotency-Key` no header ou `idempotency_key` no body.
      operationId: createCoberturaLote
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoberturaLoteRequest"
      responses:
        "200":
          description: Lote processado (ver sucesso e falhas no body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessCoberturaLote"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/integracoes/toques:
    post:
      tags: [Toques]
      summary: Registar um toque
      description: |
        Cria diagnóstico de gestação. Toque POSITIVO exige cobertura (informada ou resolvida automaticamente).
        Header opcional `Idempotency-Key` para evitar duplicatas em reenvio.
      operationId: createToque
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToqueRequest"
      responses:
        "201":
          description: Toque criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDiagnostico"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/integracoes/toques/lote:
    post:
      tags: [Toques]
      summary: Registar toques em lote
      description: |
        Processa cada item independentemente (sucesso parcial).
        `Idempotency-Key` no header ou `idempotency_key` no body.
      operationId: createToqueLote
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToqueLoteRequest"
      responses:
        "200":
          description: Lote processado (ver sucesso e falhas no body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessToqueLote"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

components:
  securitySchemes:
    IntegrationApiKey:
      type: http
      scheme: bearer
      bearerFormat: cmk_live
      description: |
        Chave API gerada em Admin → Integrações. Formato: `cmk_live_<segredo>`.
        No Swagger UI use Authorize e cole o valor completo (com prefixo cmk_live_).

  parameters:
    FazendaIdQuery:
      name: fazenda_id
      in: query
      required: true
      schema:
        type: integer
        format: int64
      description: ID da fazenda (deve estar vinculada ao cliente)
    IdentificacaoQuery:
      name: identificacao
      in: query
      required: true
      schema:
        type: string
      description: Brinco ou identificação do animal
    AnimalIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: Chave de idempotência (reenvio com mesmo body devolve resposta guardada)

  responses:
    BadRequest:
      description: Pedido inválido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Chave inválida, revogada ou ausente
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Scope ou fazenda não autorizada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Idempotency-Key já usada com payload diferente
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limit excedido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    SuccessResponse:
      type: object
      required: [data, message, timestamp]
      properties:
        data:
          description: Payload da operação
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error, timestamp]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: BAD_REQUEST
            message:
              type: string
            details:
              nullable: true
        timestamp:
          type: string
          format: date-time

    IntegracaoMe:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nome:
          type: string
        scopes:
          type: array
          items:
            type: string
            enum: [animais:read, toques:write, coberturas:read, coberturas:write]
        fazenda_ids:
          type: array
          items:
            type: integer
            format: int64
        ativo:
          type: boolean

    SuccessIntegracaoMe:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/IntegracaoMe"

    Animal:
      type: object
      properties:
        id:
          type: integer
          format: int64
        identificacao:
          type: string
        raca:
          type: string
          nullable: true
        data_nascimento:
          type: string
          format: date-time
          nullable: true
        sexo:
          type: string
          enum: [M, F]
          nullable: true
        status_saude:
          type: string
          nullable: true
        fazenda_id:
          type: integer
          format: int64
        categoria:
          type: string
          nullable: true
        status_reprodutivo:
          type: string
          nullable: true
        data_saida:
          type: string
          format: date
          nullable: true
          description: Data de saída do rebanho (baixa)
        motivo_saida:
          type: string
          enum: [VENDA, MORTE, DESCARTE, DOACAO]
          nullable: true
        observacao_saida:
          type: string
          nullable: true
        baixa_registrado_por:
          type: integer
          format: int64
          nullable: true
          description: Utilizador que registou a baixa (leitura)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SuccessAnimal:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Animal"

    SuccessAnimalList:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Animal"

    TipoCobertura:
      type: string
      enum: [IA, IATF, MONTA_NATURAL, TE]

    Cobertura:
      type: object
      properties:
        id:
          type: integer
          format: int64
        animal_id:
          type: integer
          format: int64
        cio_id:
          type: integer
          format: int64
          nullable: true
        tipo:
          $ref: "#/components/schemas/TipoCobertura"
        data:
          type: string
          format: date-time
        touro_animal_id:
          type: integer
          format: int64
          nullable: true
        touro_info:
          type: string
          nullable: true
        semen_partida:
          type: string
          nullable: true
        tecnico:
          type: string
          nullable: true
        protocolo_id:
          type: integer
          format: int64
          nullable: true
        observacoes:
          type: string
          nullable: true
        fazenda_id:
          type: integer
          format: int64
        created_by:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCoberturaRequest:
      type: object
      required: [animal_id, tipo, data, fazenda_id]
      properties:
        animal_id:
          type: integer
          format: int64
        tipo:
          $ref: "#/components/schemas/TipoCobertura"
        data:
          type: string
          format: date-time
          description: RFC3339, ex. 2026-05-20T10:00:00Z
        fazenda_id:
          type: integer
          format: int64
        cio_id:
          type: integer
          format: int64
          nullable: true
        touro_animal_id:
          type: integer
          format: int64
          nullable: true
        touro_info:
          type: string
          nullable: true
        semen_partida:
          type: string
          nullable: true
        tecnico:
          type: string
          nullable: true
        protocolo_id:
          type: integer
          format: int64
          nullable: true
        observacoes:
          type: string
          nullable: true

    SuccessCobertura:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Cobertura"

    SuccessCoberturaList:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Cobertura"

    CoberturaLoteItem:
      type: object
      required: [identificacao, tipo, data]
      properties:
        identificacao:
          type: string
        tipo:
          $ref: "#/components/schemas/TipoCobertura"
        data:
          type: string
          format: date-time
        cio_id:
          type: integer
          format: int64
          nullable: true
        touro_animal_id:
          type: integer
          format: int64
          nullable: true
        touro_info:
          type: string
          nullable: true
        semen_partida:
          type: string
          nullable: true
        tecnico:
          type: string
          nullable: true
        protocolo_id:
          type: integer
          format: int64
          nullable: true
        observacoes:
          type: string
          nullable: true

    CoberturaLoteRequest:
      type: object
      required: [fazenda_id, itens]
      properties:
        fazenda_id:
          type: integer
          format: int64
        idempotency_key:
          type: string
          maxLength: 128
        itens:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CoberturaLoteItem"

    CoberturaLoteFalha:
      type: object
      properties:
        linha:
          type: integer
        identificacao:
          type: string
        code:
          type: string
          enum:
            - ANIMAL_NAO_ENCONTRADO
            - ANIMAL_AMBIGUO
            - TIPO_INVALIDO
            - FEMEA_OBRIGATORIA
            - REPRODUTOR_OBRIGATORIO
            - REPRODUTOR_INVALIDO
            - DATA_INVALIDA
            - RESULTADO_INVALIDO
            - ERRO_INTERNO
        message:
          type: string
        animal_ids:
          type: array
          items:
            type: integer
            format: int64

    CoberturaLoteResult:
      type: object
      properties:
        total:
          type: integer
        sucesso:
          type: integer
        falhas:
          type: array
          items:
            $ref: "#/components/schemas/CoberturaLoteFalha"
        coberturas_criadas:
          type: array
          items:
            $ref: "#/components/schemas/Cobertura"

    SuccessCoberturaLote:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CoberturaLoteResult"

    ResultadoToque:
      type: string
      enum: [POSITIVO, NEGATIVO, INCONCLUSIVO]

    ClassificacaoOperacionalToque:
      type: string
      enum: [PRENHA, VAZIA, VAZIA_PEV, CLOE, CL, RETOQUE]
      description: |
        Vocabulário operacional do curral. O servidor deriva `resultado` quando omitido:
        PRENHA→POSITIVO; VAZIA/VAZIA_PEV→NEGATIVO; CLOE/CL/RETOQUE→INCONCLUSIVO.

    CreateToqueRequest:
      type: object
      required: [animal_id, data, fazenda_id]
      properties:
        animal_id:
          type: integer
          format: int64
        data:
          type: string
          format: date-time
          description: RFC3339, ex. 2026-05-20T10:00:00Z
        resultado:
          $ref: "#/components/schemas/ResultadoToque"
        classificacao_operacional:
          $ref: "#/components/schemas/ClassificacaoOperacionalToque"
        fazenda_id:
          type: integer
          format: int64
        cobertura_id:
          type: integer
          format: int64
          nullable: true
        dias_gestacao_estimados:
          type: integer
          nullable: true
        metodo:
          type: string
          enum: [PALPACAO, ULTRASSOM]
          nullable: true
        veterinario:
          type: string
          nullable: true
        observacoes:
          type: string
          nullable: true

    DiagnosticoGestacao:
      type: object
      properties:
        id:
          type: integer
          format: int64
        animal_id:
          type: integer
          format: int64
        cobertura_id:
          type: integer
          format: int64
          nullable: true
        data:
          type: string
          format: date-time
        resultado:
          $ref: "#/components/schemas/ResultadoToque"
        classificacao_operacional:
          $ref: "#/components/schemas/ClassificacaoOperacionalToque"
        dias_gestacao_estimados:
          type: integer
          nullable: true
        metodo:
          type: string
          nullable: true
        veterinario:
          type: string
          nullable: true
        observacoes:
          type: string
          nullable: true
        fazenda_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    SuccessDiagnostico:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DiagnosticoGestacao"

    ToqueLoteItem:
      type: object
      required: [identificacao, data]
      properties:
        identificacao:
          type: string
        data:
          type: string
          format: date-time
        resultado:
          $ref: "#/components/schemas/ResultadoToque"
        classificacao_operacional:
          $ref: "#/components/schemas/ClassificacaoOperacionalToque"
        cobertura_id:
          type: integer
          format: int64
          nullable: true
        dias_gestacao_estimados:
          type: integer
          nullable: true
        metodo:
          type: string
          enum: [PALPACAO, ULTRASSOM]
          nullable: true
        veterinario:
          type: string
          nullable: true
        observacoes:
          type: string
          nullable: true

    ToqueLoteRequest:
      type: object
      required: [fazenda_id, itens]
      properties:
        fazenda_id:
          type: integer
          format: int64
        idempotency_key:
          type: string
          maxLength: 128
        itens:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ToqueLoteItem"

    ToqueLoteFalha:
      type: object
      properties:
        linha:
          type: integer
        identificacao:
          type: string
        code:
          type: string
          enum:
            - ANIMAL_NAO_ENCONTRADO
            - ANIMAL_AMBIGUO
            - TOQUE_POSITIVO_SEM_COBERTURA
            - TOQUE_POSITIVO_GESTACAO_ATIVA
            - DATA_INVALIDA
            - RESULTADO_INVALIDO
            - ERRO_INTERNO
        message:
          type: string
        animal_ids:
          type: array
          items:
            type: integer
            format: int64

    ToqueLoteResult:
      type: object
      properties:
        total:
          type: integer
        sucesso:
          type: integer
        falhas:
          type: array
          items:
            $ref: "#/components/schemas/ToqueLoteFalha"
        toques_criados:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosticoGestacao"

    SuccessToqueLote:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ToqueLoteResult"
